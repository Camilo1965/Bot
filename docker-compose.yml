version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: clawdbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clawdbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clawdbot_secret}
      POSTGRES_DB: clawdbot
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clawdbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clawdbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
  redis_data:
